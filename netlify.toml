[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# Proxy API calls to Render (replace the host after your backend is live)
[[redirects]]
  from = "/api/*"
  to = "https://YOUR-RENDER-SERVICE.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
